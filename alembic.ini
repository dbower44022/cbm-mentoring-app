# Alembic entry point (WTK-133). The migration environment lives inside the
# package (src/mentorapp/storage/migrations) so the lint/type gates cover it.
# MENTORAPP_DATABASE_URL overrides the URL; the default is the local dev file.
[alembic]
script_location = src/mentorapp/storage/migrations
file_template = %%(rev)s_%%(slug)s
sqlalchemy.url = sqlite+pysqlite:///mentorapp.db
